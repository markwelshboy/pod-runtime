name: Refactor model manifest trees

on:
  push:
    paths:
      - .github/refactor-model-manifest.trigger

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collapse repeated diffusionetc entries
        run: python tools/refactor_model_manifest_trees.py model_manifest.json

      - name: Validate JSON and tree declarations
        run: |
          python -m json.tool model_manifest.json >/dev/null
          python - <<'PY'
          import json
          with open('model_manifest.json', encoding='utf-8') as handle:
              manifest = json.load(handle)
          trees = [
              (section, entry)
              for section, entries in manifest['sections'].items()
              for entry in entries
              if isinstance(entry, dict) and entry.get('mode') == 'tree'
          ]
          assert trees, 'refactor produced no tree entries'
          for section, entry in trees:
              assert entry.get('repo_id') == 'markwelshboyx/diffusionetc', (section, entry)
              assert entry.get('include'), (section, entry)
              assert entry.get('strip_prefix'), (section, entry)
              assert entry.get('path'), (section, entry)
          print(f'Validated {len(trees)} tree declarations')
          PY
          git diff --check

      - name: Commit transformed manifest
        run: |
          if git diff --quiet -- model_manifest.json; then
            echo 'No manifest changes required.'
            exit 0
          fi
          git config user.name 'pod-runtime manifest bot'
          git config user.email 'actions@users.noreply.github.com'
          git add model_manifest.json
          git commit -m 'Collapse diffusionetc model entries into trees'
          git push
