name: Apply HF repo sync fix

on:
  push:
    paths:
      - .github/apply-hf-repo-sync-fix.trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wire filtered HF repo sync helper
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          helpers = Path("helpers.sh")
          text = helpers.read_text(encoding="utf-8")
          marker = 'source "${_helpers_entry_dir}/helpers_core.sh"\n'
          addition = (
              marker
              + '# shellcheck source=/dev/null\n'
              + '[[ -f "${_helpers_entry_dir}/helpers_hf_repo_sync.sh" ]] && '
                'source "${_helpers_entry_dir}/helpers_hf_repo_sync.sh"\n'
          )
          if "helpers_hf_repo_sync.sh" not in text:
              if marker not in text:
                  raise SystemExit("helpers.sh core-source marker not found")
              text = text.replace(marker, addition, 1)
              helpers.write_text(text, encoding="utf-8")

          start = Path("start.sh")
          text = start.read_text(encoding="utf-8")
          pattern = re.compile(
              r'if \[\[ "\$\{ENABLE_MY_REPO_DOWNLOAD:-false\}" == "true" \]\]; then\n'
              r'.*?'
              r'\nelse\n'
              r'  echo "ENABLE_MYREPO_DOWNLOAD=false → skipping MyRepo sync\."\n'
              r'fi',
              re.DOTALL,
          )
          replacement = '''if [[ "${ENABLE_MY_REPO_DOWNLOAD:-false}" == "true" ]]; then

  export HF_EXCLUDE_GLOBS="${HF_MY_REPO_EXCLUDE_GLOBS:-training/** snapshot/** models/loras/** deleteme/** latestimages/**}"
  export HF_INCLUDE_GLOBS="${HF_MY_REPO_INCLUDE_GLOBS:-models/ultralytics/** models/upscale_models/**}"

  if HF_REPO_TYPE="${HF_MY_REPO_TYPE:-model}" \
      init_repo --hf "$HF_MY_REPO_ID" "$HF_MY_REPO_LOCAL"; then
    if ! hf_my_repo_sync_assets "$HF_MY_REPO_LOCAL" "$HF_MY_REPO_ID"; then
      _sync_warn "$HF_MY_REPO_ID downloaded, but asset extraction/linking reported errors."
    fi
  else
    _sync_warn "HF repo download failed for $HF_MY_REPO_ID at '$HF_MY_REPO_LOCAL'."
  fi

else
  echo "ENABLE_MYREPO_DOWNLOAD=false → skipping MyRepo sync."
fi'''

          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              if "hf_my_repo_sync_assets" not in text:
                  raise SystemExit(f"start.sh HF repo block replacement count={count}")
          else:
              start.write_text(updated, encoding="utf-8")
          PY

      - name: Validate shell changes
        run: |
          bash -n helpers.sh
          bash -n helpers_hf_repo_sync.sh
          bash -n start.sh
          git diff --check

      - name: Commit changes
        run: |
          if git diff --quiet -- helpers.sh start.sh; then
            echo "No wiring changes required."
            exit 0
          fi
          git config user.name "pod-runtime maintenance bot"
          git config user.email "actions@users.noreply.github.com"
          git add helpers.sh start.sh
          git commit -m "Fix filtered HF repo health and asset linking"
          git push
